name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Verify modules
        run: |
          go mod download
          go mod verify

      - name: gofmt
        run: |
          out=$(gofmt -l ./cmd ./internal)
          if [ -n "$out" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$out"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

      - name: Unit tests
        run: go test -race -v ./...

  build:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Build current platform
        run: make build

      - name: Smoke-test gdrive skill
        run: |
          out=$(./bin/gdrive-linux-amd64 skill 2>/dev/null || true)
          if ! echo "$out" | head -1 | grep -q '^---$'; then
            # Fallback: build name may differ on actual runner arch
            bin=$(ls bin/gdrive-* | head -1)
            out=$("$bin" skill)
          fi
          echo "$out" | head -3
          echo "$out" | grep -q "^name: gdrive$"
