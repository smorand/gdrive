linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - unparam
    - gosec
    - prealloc
    - nolintlint
    - revive

linters-settings:
  errcheck:
    check-type-assertions: true
  govet:
    enable:
      - shadow
  revive:
    rules:
      - name: unexported-return
        disabled: true
  gosec:
    excludes:
      # G104: handled per-call with explicit ignores where appropriate
      - G104

issues:
  exclude-dirs:
    - bin
    - init
    - iac
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - errcheck
