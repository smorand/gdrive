services:
  gdrive:
    build:
      context: .
      args:
        GO_BIN: gdrive
        HAS_INTERNAL: "yes"
        HAS_DATA: "no"
    container_name: gdrive
    restart: unless-stopped
    # The Dockerfile ENTRYPOINT is the bare binary; the subcommand and any
    # MCP-server flags are supplied here so the same image can also be used
    # for ad-hoc CLI invocations (override `command:` at run time).
    command: ["mcp"]
    expose:
      - "8080"
    volumes:
      - /app/data/gdrive:/data
    env_file:
      - /app/data/gdrive/.env
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - proxy-network

networks:
  proxy-network:
    external: true
